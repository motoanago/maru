<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Index</title>

<style>
body {
  margin: 0;
  font-family: "Hiragino Maru Gothic ProN", "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #ffd1dc, #ffe4f0, #e0c3fc);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* カード */
.container {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(14px);
  border-radius: 30px;
  padding: 28px 22px;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 12px 35px rgba(0,0,0,0.12);
  text-align: center;
}

/* タイトル */
.main-title {
  font-size: 24px;
  color: #ff5c8a;
  margin-bottom: 18px;
  font-weight: bold;
}

/* 入力欄 */
input[type="text"] {
  width: 100%;
  padding: 16px;
  border-radius: 22px;
  border: none;
  font-size: 16px;
  box-sizing: border-box;
  background: #f7f7f7;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.08);
  margin-bottom: 16px;
}

/* ボタン */
button {
  width: 100%;
  padding: 15px;
  border-radius: 25px;
  border: none;
  font-size: 17px;
  font-weight: bold;
  cursor: pointer;
  color: #fff;
  transition: 0.15s;
}

/* メインボタン */
.btn-main {
  background: linear-gradient(135deg, #ff7eb3, #ff758c);
  margin-bottom: 22px;
}

/* サブボタン */
.btn-sub {
  background: linear-gradient(135deg, #f6d365, #fda085);
  margin-top: 18px;
}

/* セクションタイトル */
.section-title {
  font-size: 20px;
  color: #ff5c8a;
  margin: 10px 0 4px 0;
  font-weight: bold;
}

/* 補足テキスト */
.sub-text {
  font-size: 14px;
  color: #ff8aa5;
  margin-bottom: 12px;
}

/* 色エリア */
.color-area {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-top: 5px;
}

/* 色ボタン */
.color-btn {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 14px;
  border: 2px solid #ccc;
  cursor: pointer;
  transition: 0.15s;
  box-shadow: 0 4px 8px rgba(0,0,0,0.15);
  box-sizing: border-box;
}

/* 選択状態 */
.color-btn.active {
  border: 4px solid #ff5c8a;
  box-shadow:
    inset 0 5px 12px rgba(0,0,0,0.4),
    inset 0 -2px 5px rgba(255,255,255,0.3);
}

/* 色 */
.c-pink   { background:#FF69B4; }
.c-red    { background:#FF3B3B; }
.c-orange { background:#FFA500; }
.c-yellow { background:#FFD700; }
.c-blue   { background:#00CFFF; }
.c-navy   { background:#3D5AFE; }
.c-green  { background:#4CAF50; }
.c-lime   { background:#8BC34A; }
.c-purple { background:#B39DDB; }
.c-white  { background:#FFFFFF; border:2px solid #bbb; }

/* タップ時 */
button:active {
  transform: scale(0.97);
}

</style>
</head>

<body>

<div class="container">

  <div class="main-title">名前を入力</div>

  <form id="myForm" method="get">

    <input type="text" name="message" placeholder="お名前を入力">

    <button class="btn-main" type="submit" onclick="setAction('MVP_sakura.html')">
      ＭＶＰ
    </button>

    <div class="section-title">紙吹雪の色を選択</div>
    <div class="sub-text">※色選択なしは通常の紙吹雪</div>

    <div class="color-area">
      <div class="color-btn c-pink"   onclick="selectColor('pink', this)"></div>
      <div class="color-btn c-red"    onclick="selectColor('red', this)"></div>
      <div class="color-btn c-orange" onclick="selectColor('orange', this)"></div>
      <div class="color-btn c-yellow" onclick="selectColor('yellow', this)"></div>
      <div class="color-btn c-blue"   onclick="selectColor('blue', this)"></div>
      <div class="color-btn c-navy"   onclick="selectColor('navy', this)"></div>
      <div class="color-btn c-green"  onclick="selectColor('green', this)"></div>
      <div class="color-btn c-lime"   onclick="selectColor('lime', this)"></div>
      <div class="color-btn c-purple" onclick="selectColor('purple', this)"></div>
      <div class="color-btn c-white"  onclick="selectColor('white', this)"></div>
    </div>

    <button class="btn-sub" type="submit" onclick="setAction('map.html')">
      全国制覇
    </button>

    <input type="hidden" name="color" id="colorInput">

  </form>
</div>

<script>
let selectedColor = "";

function selectColor(color, el){

  if(selectedColor === color){
    selectedColor = "";
    document.getElementById("colorInput").value = "";

    document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
    return;
  }

  selectedColor = color;
  document.getElementById("colorInput").value = color;

  document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
  el.classList.add('active');
}

function setAction(url){
  document.getElementById('myForm').action = url;
}
</script>

</body>
</html>
