<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Index</title>

<style>
body {
  margin: 0;
  font-family: "Hiragino Maru Gothic ProN", "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #ffd1dc, #ffe4f0, #e0c3fc);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
  border-radius: 25px;
  padding: 25px;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  text-align: center;
}

h1 {
  font-size: 22px;
  margin-bottom: 20px;
  color: #ff5c8a;
}

.form-area {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

input[type="text"] {
  width: 100%;
  padding: 14px;
  border-radius: 18px;
  border: none;
  font-size: 16px;
  box-sizing: border-box;
  background: #fff;
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 18px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
  color: #fff;
}

.btn1 { background: linear-gradient(135deg, #ff7eb3, #ff758c); }
.btn2 { background: linear-gradient(135deg, #f6d365, #fda085); }
.btn3 { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
.btn4 { background: linear-gradient(135deg, #84fab0, #8fd3f4); }

/* 色ボタンエリア */
.color-area {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-top: 10px;
}

/* 色ボタン（サイズ固定・立体） */
.color-btn {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 12px;
  border: 2px solid #999;
  cursor: pointer;
  transition: 0.15s;
  box-shadow: 0 3px 6px rgba(0,0,0,0.2);
}

/* 選択状態（サイズ変えない） */
.color-btn.active {
  border: 4px solid #333; /* ←枠色変化 */
  box-shadow:
    inset 0 4px 10px rgba(0,0,0,0.6),
    inset 0 -2px 4px rgba(255,255,255,0.3);
}

/* 10色 */
.c-pink   { background:#FF69B4; }
.c-red    { background:#FF0000; }
.c-orange { background:#FFA500; }
.c-yellow { background:#FFD700; }
.c-blue   { background:#00CFFF; }
.c-navy   { background:#0000FF; }
.c-green  { background:#4CAF50; }
.c-lime   { background:#8BC34A; }
.c-purple { background:#a18cd1; }
.c-white  { background:#FFFFFF; border:2px solid #666; }

/* 押した瞬間だけ軽く反応（ホバーなし） */
button:active {
  transform: scale(0.97);
}

</style>
</head>

<body>

<div class="container">
  <h1>名前を入力</h1>

  <form id="myForm" method="get" class="form-area">
    <input type="text" name="message" placeholder="お名前を入力">

    <button class="btn1" type="submit" onclick="setAction('MVP_sakura.html')">ＭＶＰ</button>

    <h1>紙吹雪の色を選択</h1>
    <h1>選択しない場合は通常の紙吹雪</h1>
    
    <!-- 色選択 -->
    <div class="color-area">
      <div class="color-btn c-pink"   onclick="selectColor('pink', this)"></div>
      <div class="color-btn c-red"    onclick="selectColor('red', this)"></div>
      <div class="color-btn c-orange" onclick="selectColor('orange', this)"></div>
      <div class="color-btn c-yellow" onclick="selectColor('yellow', this)"></div>
      <div class="color-btn c-blue"   onclick="selectColor('blue', this)"></div>
      <div class="color-btn c-navy"   onclick="selectColor('navy', this)"></div>
      <div class="color-btn c-green"  onclick="selectColor('green', this)"></div>
      <div class="color-btn c-lime"   onclick="selectColor('lime', this)"></div>
      <div class="color-btn c-purple" onclick="selectColor('purple', this)"></div>
      <div class="color-btn c-white"  onclick="selectColor('white', this)"></div>
    </div>

    <button class="btn2" type="submit" onclick="setAction('map.html')">全国制覇</button>
    
    <input type="hidden" name="color" id="colorInput">
  </form>
</div>

<script>
let selectedColor = "";

// 色選択（再タップ解除対応）
function selectColor(color, el){

  if(selectedColor === color){
    selectedColor = "";
    document.getElementById("colorInput").value = "";

    document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
    return;
  }

  selectedColor = color;
  document.getElementById("colorInput").value = color;

  document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
  el.classList.add('active');
}

// 遷移先設定
function setAction(url){
  document.getElementById('myForm').action = url;
}
</script>

</body>
</html>
