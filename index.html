<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Index</title>

<style>
body {
  margin: 0;
  font-family: "Hiragino Maru Gothic ProN", "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #ffd1dc, #ffe4f0, #e0c3fc);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* カード */
.container {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
  border-radius: 25px;
  padding: 25px;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  text-align: center;
}

/* タイトル */
h1 {
  font-size: 22px;
  margin-bottom: 20px;
  color: #ff5c8a;
}

/* 共通幅（ここがポイント） */
.form-area {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* 入力欄 */
input[type="text"] {
  width: 100%;
  padding: 14px;
  border-radius: 18px;
  border: none;
  font-size: 16px;
  box-sizing: border-box; /* ←これ重要（はみ出し防止） */
  background: #fff;
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
}

/* ボタン */
button {
  width: 100%; /* ←入力欄と完全一致 */
  padding: 14px;
  border-radius: 18px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.25s;
  color: #fff;
  box-sizing: border-box;
}

/* カラーバリエーション */
.btn1 { background: linear-gradient(135deg, #ff7eb3, #ff758c); }
.btn2 { background: linear-gradient(135deg, #f6d365, #fda085); }
.btn3 { background: linear-gradient(135deg, #84fab0, #8fd3f4); }
.btn4 { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }

/* 動き */
button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

button:active {
  transform: scale(0.97);
}

/* PC調整 */
@media(min-width:768px){
  h1 { font-size: 26px; }
  button { font-size: 17px; }
}
</style>

<script>
function setAction(actionUrl) {
  document.getElementById('myForm').action = actionUrl;
}
</script>

</head>

<body>

<div class="container">
  <h1>名前を入力</h1>

  <form id="myForm" method="get" class="form-area">
    <input type="text" name="message" placeholder="お名前を入力">

    <button class="btn1" type="submit" onclick="setAction('MVP999.html')">MVP（紙吹雪）</button>
    <button class="btn2" type="submit" onclick="setAction('map.html')">全国制覇</button>

    <button class="btn3" type="submit" onclick="setAction('information.html')">MVP_BK</button>
    <button class="btn4" type="submit" onclick="setAction('mvp_Pink.html')">MVP_PINK</button>
    
  </form>
</div>

</body>
</html>
