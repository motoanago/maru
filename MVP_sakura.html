<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Info</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-image: url('photos/mvp2.png');
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #message-box {
      width: 80vw;
      height: 35vh;
      padding: 1vh 2vw;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 10px;
      box-sizing: border-box;
      overflow: hidden;
    }

    #message-text {
      font-size: 12vw;
      line-height: 1;
      white-space: nowrap;
      transform-origin: center center;
      display: inline-block;
      transform: scaleX(-1);
      font-family: "Yu Gothic", "Meiryo", sans-serif;
      color: white;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      #message-text {
        font-size: 20vw;
      }
    }

    @media (max-width: 768px) {
      #message-text {
        font-size: 15vw;
      }
    }
  </style>
</head>

<body>

  <div id="message-box">
    <div id="message-text"></div>
  </div>

  <!-- 紙吹雪ライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const message = params.get('message');
    const colorType = params.get('color') || 'normal';

    const textEl = document.getElementById('message-text');
    const boxEl = document.getElementById('message-box');

    // メッセージ表示
    if (message) {
      textEl.textContent = message;

      function adjustScale() {
        const boxWidth = boxEl.clientWidth;
        const boxHeight = boxEl.clientHeight;
        const textWidth = textEl.scrollWidth;
        const textHeight = textEl.scrollHeight;
        const scaleX = boxWidth / textWidth;
        const scaleY = boxHeight / textHeight;
        const scale = Math.min(scaleX, scaleY, 1);
        textEl.style.transform = `scaleX(-1) scale(${scale})`;
      }

      window.addEventListener('resize', adjustScale);
      adjustScale();
    }

    // 🌈 色設定（10色＋デフォルト）
    function getColors(type){
      switch(type){
        case 'pink':   return ['#FFC0CB','#FF69B4','#FFD1DC'];
        case 'red':    return ['#FF0000','#FF6666'];
        case 'orange': return ['#FFA500','#FFD580'];
        case 'yellow': return ['#FFD700','#FFF176'];
        case 'blue':   return ['#00CFFF','#66E0FF'];
        case 'navy':   return ['#0000FF','#6666FF'];
        case 'green':  return ['#4CAF50','#A5D6A7'];
        case 'lime':   return ['#8BC34A','#DCE775'];
        case 'purple': return ['#A18CD1','#D1C4E9'];
        case 'white':  return ['#FFFFFF','#EEEEEE'];
        default:
          return ['#FFD700','#FFFFFF','#FF0000','#00CFFF'];
      }
    }

    // 🌸 桜風クラッカー（色対応）
    document.addEventListener('click', function () {

      function fire(side) {
        confetti({
          particleCount: 180,
          spread: 75,
          startVelocity: 60,
          gravity: 0.55,
          ticks: 320,
          scalar: Math.random() * 0.8 + 1.2,

          origin: {
            x: side === 'left' ? 0 : 1,
            y: 1
          },

          angle: side === 'left' ? 60 : 120,

          colors: getColors(colorType),

          shapes: ['circle'],

          drift: side === 'left' ? 0.8 : -0.8,

          spin: Math.random() * 3 + 2
        });
      }

      fire('left');
      fire('right');

      setTimeout(() => {
        fire('left');
        fire('right');
      }, 120);

    });
  </script>

</body>
</html>
