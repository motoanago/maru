<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Info</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
}

body {
  background-image: url('photos/mvp2.png');
  background-size: 100% 100%;
  background-position: center;
  background-repeat: no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
}

#message-box {
  width: 80vw;
  height: 35vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

#message-text {
  font-size: 12vw;
  white-space: nowrap;
  transform: scaleX(-1);
  font-family: "Yu Gothic", "Meiryo", sans-serif;
  color: white;
  font-weight: bold;
}

.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  pointer-events: none;
  animation: sparkleAnim 0.8s ease-out forwards;
}

@keyframes sparkleAnim {
  0% {
    opacity: 1;
    transform: scale(0.5);
  }
  50% {
    opacity: 1;
    transform: scale(1.5);
  }
  100% {
    opacity: 0;
    transform: scale(0);
  }
}
</style>
</head>

<body>

<div id="message-box">
  <div id="message-text"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const message = params.get('message');
const colorType = params.get('color') || 'normal';

const textEl = document.getElementById('message-text');

// メッセージ
if (message) {
  textEl.textContent = message;
}

// カラー
function getColors(type){
  switch(type){
    case 'gold':
      return ['#FFD700','#FFF8DC','#FFEC8B','#FFFFFF'];
    case 'silver':
      return ['#C0C0C0','#E8E8E8','#FFFFFF','#B0B0B0'];
    case 'pink':
      return ['#FF69B4','#FFB6C1','#FFC0CB'];
    default:
      return ['#FFD700','#FFFFFF','#FF0000','#00CFFF'];
  }
}

// キラキラ点滅生成
function createSparkle(x, y, color){
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.style.left = x + 'px';
  s.style.top = y + 'px';
  s.style.background = color;
  document.body.appendChild(s);

  setTimeout(() => s.remove(), 800);
}

// 発射
function fire(side){

  const isSpecial = (colorType === 'gold' || colorType === 'silver');

  // メイン
  confetti({
    particleCount: isSpecial ? 220 : 180,
    spread: 75,
    startVelocity: isSpecial ? 70 : 60,
    gravity: colorType === 'silver' ? 0.38 : 0.55,
    ticks: 320,

    scalar: isSpecial
      ? Math.random() * 1.6 + 1.8
      : Math.random() * 1.2 + 1.4,

    origin: {
      x: side === 'left' ? 0 : 1,
      y: 1
    },

    angle: side === 'left' ? 60 : 120,

    colors: getColors(colorType),

    shapes: isSpecial ? ['star'] : ['circle'],

    drift: side === 'left' ? 0.8 : -0.8,
    spin: isSpecial
      ? Math.random() * 6 + 4
      : Math.random() * 3 + 2
  });

  // 白キラ粒（発光）
  if(isSpecial){
    confetti({
      particleCount: 100,
      spread: 90,
      startVelocity: 80,
      gravity: 0.4,
      ticks: 200,
      scalar: Math.random() * 1.2 + 1.5,

      origin: {
        x: side === 'left' ? 0 : 1,
        y: 1
      },

      angle: side === 'left' ? 60 : 120,

      colors: ['#FFFFFF'],
      shapes: ['star'],
      drift: side === 'left' ? 1 : -1,
      spin: Math.random() * 8 + 5
    });

    // ✨ 点滅エフェクト（ここが本物感）
    for(let i=0;i<20;i++){
      setTimeout(()=>{
        createSparkle(
          Math.random() * window.innerWidth,
          Math.random() * window.innerHeight,
          colorType === 'gold' ? '#FFF8DC' : '#FFFFFF'
        );
      }, i * 80);
    }
  }
}

// クリックで発射
document.addEventListener('click', () => {

  fire('left');
  fire('right');

  setTimeout(()=>{
    fire('left');
    fire('right');
  },120);

});
</script>

</body>
</html>
