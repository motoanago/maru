<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Info</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
}

body {
  background-image: url('photos/mvp2.png');
  background-size: 100% 100%;
  background-position: center;
  background-repeat: no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
}

#message-box {
  width: 80vw;
  height: 35vh;
  padding: 1vh 2vw;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 10px;
  box-sizing: border-box;
  overflow: hidden;
}

#message-text {
  font-size: 12vw;
  line-height: 1;
  white-space: nowrap;
  transform-origin: center center;
  display: inline-block;
  transform: scaleX(-1);
  font-family: "Yu Gothic", "Meiryo", sans-serif;
  color: white;
  font-weight: bold;
}

@media (max-width: 768px) {
  #message-text { font-size: 15vw; }
}
@media (max-width: 600px) {
  #message-text { font-size: 20vw; }
}
</style>
</head>

<body>

<div id="message-box">
  <div id="message-text"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
/* =========================
   初期処理
========================= */
const params = new URLSearchParams(window.location.search);
const message = params.get('message');
const colorType = params.get('color');

const textEl = document.getElementById('message-text');
const boxEl = document.getElementById('message-box');

/* 文字表示 */
if (message) {
  textEl.textContent = message;

  function adjustScale() {
    const scale = Math.min(
      boxEl.clientWidth / textEl.scrollWidth,
      boxEl.clientHeight / textEl.scrollHeight,
      1
    );
    textEl.style.transform = `scaleX(-1) scale(${scale})`;
  }

  window.addEventListener('resize', adjustScale);
  adjustScale();
}

/* =========================
   色定義（完全固定）
========================= */
function getColors(type){
  switch(type){
    case 'pink':   return ['#FF69B4','#ff8fc7','#ffc1dd'];
    case 'red':    return ['#FF3B3B','#ff6b6b','#ff9e9e'];
    case 'orange': return ['#FFA500','#ffbe55','#ffd89a'];
    case 'yellow': return ['#FFD700','#ffe45c','#fff3a3'];
    case 'blue':   return ['#00CFFF','#66e0ff','#b3f0ff'];
    case 'navy':   return ['#3D5AFE','#6f85ff','#aab8ff'];
    case 'green':  return ['#2E7D32','#4CAF50','#81C784'];
    case 'lime':   return ['#8BC34A','#aed581','#dcedc8'];
    case 'purple': return ['#B39DDB','#d1c4e9','#ede7f6'];
    case 'white':  return ['#ffffff','#eeeeee','#dddddd'];

    // 未選択（通常紙吹雪）
    default:
      return ['#FFD700', '#FFFFFF', '#FF0000', '#00CFFF'];
  }
}

/* =========================
   クリック制御（完全ロック）
========================= */
let fired = false;

/* 他のクリックイベントを完全無効化 */
document.onclick = null;

/* これだけが唯一のイベント */
document.onclick = function () {

  if (fired) return; // 2回目防止
  fired = true;

  const colors = getColors(colorType);

  function fire(side) {
    confetti({
      particleCount: 160,
      spread: 70,
      startVelocity: 60,
      gravity: 0.9,
      ticks: 250,
      scalar: 2.4,
      origin: {
        x: side === 'left' ? 0 : 1,
        y: 1
      },
      angle: side === 'left' ? 60 : 120,
      colors: colors
    });
  }

  fire('left');
  fire('right');
};
</script>

</body>
</html>
