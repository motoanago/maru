<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Info</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
}

body {
  background-image: url('photos/mvp2.png');
  background-size: 100% 100%;
  background-position: center;
  background-repeat: no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
}

#message-box {
  width: 80vw;
  height: 35vh;
  padding: 1vh 2vw;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 10px;
  box-sizing: border-box;
  overflow: hidden;
}

#message-text {
  font-size: 12vw;
  line-height: 1;
  white-space: nowrap;
  transform-origin: center center;
  display: inline-block;
  transform: scaleX(-1);
  font-family: "Yu Gothic", "Meiryo", sans-serif;
  color: white;
  font-weight: bold;

  /* ✨文字キラキラ */
  animation: glow 1.2s infinite alternate;
}

@keyframes glow {
  0% {
    text-shadow: 0 0 8px rgba(255,255,255,0.5),
                 0 0 15px rgba(255,255,255,0.3);
  }
  100% {
    text-shadow: 0 0 18px rgba(255,255,255,1),
                 0 0 35px rgba(255,255,255,0.8);
  }
}

@media (max-width: 768px) {
  #message-text { font-size: 15vw; }
}
@media (max-width: 600px) {
  #message-text { font-size: 20vw; }
}
</style>
</head>

<body>

<div id="message-box">
  <div id="message-text"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const message = params.get('message');
const colorType = params.get('color') || 'normal';

const textEl = document.getElementById('message-text');
const boxEl = document.getElementById('message-box');

/* 文字表示 */
if (message) {
  textEl.textContent = message;

  function adjustScale() {
    const scale = Math.min(
      boxEl.clientWidth / textEl.scrollWidth,
      boxEl.clientHeight / textEl.scrollHeight,
      1
    );
    textEl.style.transform = `scaleX(-1) scale(${scale})`;
  }

  window.addEventListener('resize', adjustScale);
  adjustScale();
}

/* 🎨 同系色3段階（インデックスと一致） */
function getColors(type){
  switch(type){
    case 'pink':   return ['#FF69B4','#ff8fc7','#ffc1dd'];
    case 'red':    return ['#FF3B3B','#ff6b6b','#ff9e9e'];
    case 'orange': return ['#FFA500','#ffbe55','#ffd89a'];
    case 'yellow': return ['#FFD700','#ffe45c','#fff3a3'];
    case 'blue':   return ['#00CFFF','#66e0ff','#b3f0ff'];
    case 'navy':   return ['#3D5AFE','#6f85ff','#aab8ff'];
    case 'green':  return ['#4CAF50','#81c784','#b9f6ca'];
    case 'lime':   return ['#8BC34A','#aed581','#dcedc8'];
    case 'purple': return ['#B39DDB','#d1c4e9','#ede7f6'];
    case 'white':  return ['#ffffff','#eeeeee','#dddddd'];
    default:
      return ['#FF69B4','#FF3B3B','#00CFFF'];
  }
}

const baseColors = getColors(colorType);

/* ✨点滅用（透明度ランダム） */
function toRGBA(hex, alpha){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function getFlashColors(colors){
  return colors.map(c => toRGBA(c, Math.random()*0.7+0.3));
}

/* 🌸 桜風クラッカー */
document.addEventListener('click', function () {

  function fire(side) {

    // 🌸メイン（花びら風）
    confetti({
      particleCount: 160,
      spread: 75,
      startVelocity: 55,
      gravity: 0.55,
      ticks: 320,
      scalar: Math.random() * 1.2 + 1.6,
      origin: { x: side === 'left' ? 0 : 1, y: 1 },
      angle: side === 'left' ? 60 : 120,
      colors: baseColors,
      shapes: ['circle'],
      drift: side === 'left' ? 0.8 : -0.8,
      spin: Math.random() * 3 + 2
    });

    // ✨キラキラ粒（点滅風）
    confetti({
      particleCount: 90,
      spread: 100,
      startVelocity: 40,
      gravity: 0.7,
      ticks: 200,
      scalar: 1.2,
      shapes: ['circle'],
      origin: { x: side === 'left' ? 0 : 1, y: 1 },
      angle: side === 'left' ? 60 : 120,
      colors: getFlashColors(baseColors)
    });
  }

  fire('left');
  fire('right');

  // 🌸少し遅らせて自然に
  setTimeout(() => {
    fire('left');
    fire('right');
  }, 120);

});
</script>

</body>
</html>
