<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>対象ギフトカレンダー 2026年1月</title>
  <style>
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background-color: #fafafa;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: 1.4em;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .image-block {
      margin-bottom: 40px;
    }

    .image-block img {
      width: 80%;           /* 画面幅の80%に調整 */
      max-width: 250px;     /* 最大幅250px */
      height: auto;         /* 高さは自動調整 */
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: transform 0.2s;
      cursor: default;      /* クリック感なし */
    }

    .image-block img:hover {
      transform: scale(1.02);
    }

    .caption {
      font-size: 0.9em;
      margin-top: 10px;
      color: #333;
    }

    .caption small {
      display: block;
      font-size: 0.8em;
      color: #555;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <h1>サブメン対象ギフトカレンダー</h1>
  <h1>2026年1月</h1>
  <h1>応援ありがとう</h1>
  <h1>ほしいカレンダーを長押しして保存してね！</h1>

  <div class="image-block">
    <img src="/maru/photos/202601_12902796.jpg" alt="汎用版">
    <div class="caption">
      汎用
      <small>※画像を長押ししてカメラロールに保存してください</small>
    </div>
  </div>

  <div class="image-block">
    <img src="/maru/photos/202601_14402560.jpg" alt="iPhone用">
    <div class="caption">
      iPhone用
      <small>※画像を長押ししてカメラロールに保存してください</small>
    </div>
  </div>

  <div class="image-block">
    <img src="/maru/photos/202601_7201600.jpg" alt="軽量版">
    <div class="caption">
      軽量版
      <small>※画像を長押ししてカメラロールに保存してください</small>
    </div>
  </div>
</body>
</html>
